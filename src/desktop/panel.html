  <div class="player-shell" id="playerRoot" aria-label="YuTuTui mini player">
    <header id="dragRegion">
      <div class="brand"><span class="cat">=^..^=</span> YuTuTui!</div>
      <div class="chip" id="stateLabel" data-state="disconnected" role="status">Disconnected</div>
      <button class="icon-btn pin" data-action="set_pinned" id="pin" title="Keep player visible" aria-label="Keep player visible" aria-pressed="false"><svg class="icon" aria-hidden="true"><use href="#icon-pin"/></svg></button>
      <button class="icon-btn" data-action="refresh" id="refreshTop" title="Refresh" aria-label="Refresh status"><svg class="icon" aria-hidden="true"><use href="#icon-refresh-cw"/></svg></button>
      <button class="icon-btn" data-action="hide" id="hide" title="Hide" aria-label="Hide mini player"><svg class="icon" aria-hidden="true"><use href="#icon-x"/></svg></button>
    </header>

    <button class="compact-menu" id="compactMenu" title="More controls" aria-label="More controls" aria-expanded="false" aria-controls="panelNow tabQueue tabMore"><svg class="icon" aria-hidden="true"><use href="#icon-ellipsis"/></svg></button>

    <div class="mode-switch" id="modeSwitch" role="radiogroup" aria-label="Playback mode" title="Switch between normal playback and the dedicated radio mode">
      <button id="modeMusic" data-mode="music" role="radio" aria-checked="true"><span class="icon-label"><svg class="icon" aria-hidden="true"><use href="#icon-music"/></svg><span>Music</span></span></button>
      <button id="modeRadio" data-mode="radio" role="radio" aria-checked="false"><span class="icon-label"><svg class="icon" aria-hidden="true"><use href="#icon-radio"/></svg><span>Radio</span></span></button>
    </div>

    <div class="tabs" role="tablist" aria-label="Mini player pages">
      <button class="tab active" data-tab="now" id="tabNow" role="tab" aria-selected="true" aria-controls="panelNow" tabindex="0">Now</button>
      <button class="tab" data-tab="queue" id="tabQueue" role="tab" aria-selected="false" aria-controls="panelQueue" tabindex="-1">Queue</button>
      <button class="tab" data-tab="more" id="tabMore" role="tab" aria-selected="false" aria-controls="panelMore" tabindex="-1">More</button>
    </div>

    <div id="sharedSheetBar">
      <button id="sharedSheetBack" title="Back" aria-label="Back"><svg class="icon" aria-hidden="true"><use href="#icon-skip-back"/></svg></button>
      <div id="sharedSheetTitle">Queue</div>
    </div>

    <main>
      <section class="tab-panel active" data-panel="now" id="panelNow" role="tabpanel" aria-labelledby="tabNow">
        <div class="now-card">
          <div class="now-art">
            <img id="artImg" alt="" draggable="false" hidden>
            <svg class="icon" aria-hidden="true"><use href="#icon-music"/></svg>
          </div>
          <div class="now-copy">
            <div class="title" id="title">YuTuTui! is not running</div>
            <div class="artist" id="artist">YuTuTui!</div>
            <div class="meta">
              <span id="ownerLabel">Offline</span>
              <span aria-hidden="true">&#183;</span>
              <span id="queueLabel">Queue unavailable</span>
              <span class="onair" id="onAir" hidden>ON AIR</span>
            </div>
          </div>

          <div class="recovery" id="recovery" hidden aria-label="Player recovery">
            <button class="primary-recovery" data-action="resume_daemon" data-recovery="resume">Resume previous session</button>
            <button data-action="start_daemon" data-recovery="start">Start new player</button>
            <button data-action="open_tui" data-recovery="tui">Open TUI</button>
          </div>

          <div class="progress-row">
            <button class="step" data-action="seek_back" id="seekBack" title="Seek back">-10</button>
            <div class="bar" id="progressBar" role="slider" tabindex="0" aria-label="Playback position" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0" aria-valuetext="Unavailable" aria-disabled="true">
              <div class="track"><div class="fill" id="progressFill"></div></div>
              <div class="knob" id="progressKnob"></div>
            </div>
            <button class="step" data-action="seek_forward" id="seekForward" title="Seek forward">+10</button>
          </div>
          <div class="times">
            <span id="timeElapsed">-:--</span>
            <span id="timeTotal">-:--</span>
          </div>
        </div>

        <div class="transport-slot" id="transportSlot">
          <div class="transport" id="sharedTransport" role="group" aria-label="Playback controls">
            <button class="skip" data-action="previous" id="previous" title="Previous" aria-label="Previous"><svg class="icon" aria-hidden="true"><use href="#icon-skip-back"/></svg></button>
            <button class="primary" data-action="play_pause" id="playPause" title="Play or pause" aria-label="Play or pause"><svg class="icon" aria-hidden="true"><use href="#icon-play"/></svg></button>
            <button class="skip" data-action="next" id="next" title="Next" aria-label="Next"><svg class="icon" aria-hidden="true"><use href="#icon-skip-forward"/></svg></button>
          </div>
        </div>

        <div class="pill-row">
          <button data-action="toggle_shuffle" id="shuffle" title="Shuffle" aria-label="Shuffle" aria-pressed="false"><span class="icon-label"><svg class="icon" aria-hidden="true"><use href="#icon-shuffle"/></svg><span data-i18n="shuffle">Shuffle</span></span></button>
          <button data-action="cycle_repeat" id="repeat" title="Repeat" aria-label="Repeat: Off" aria-pressed="false"><span class="icon-label"><svg class="icon" aria-hidden="true"><use href="#icon-repeat"/></svg><span id="repeatText">Off</span></span></button>
          <button data-action="set_streaming" id="streaming" title="Autoplay" aria-label="Autoplay" aria-pressed="false"><span class="icon-label"><svg class="icon" aria-hidden="true"><use href="#icon-sparkles"/></svg><span data-i18n="autoplay">Autoplay</span></span></button>
        </div>

        <div class="volume-row">
          <span class="vol-ico"><svg class="icon" aria-hidden="true"><use href="#icon-volume"/></svg></span>
          <div class="bar" id="volumeBar" role="slider" tabindex="0" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-valuetext="Unavailable" aria-disabled="true" title="Scroll, drag, or use arrow keys to change the volume">
            <div class="track"><div class="fill" id="volumeFill"></div></div>
            <div class="knob" id="volumeKnob"></div>
          </div>
          <span id="volumePct">--</span>
        </div>
      </section>

      <section class="tab-panel" data-panel="queue" id="panelQueue" role="tabpanel" aria-labelledby="tabQueue" aria-hidden="true">
        <div class="queue-head">
          <span class="label" id="queueSummary">Queue unavailable</span>
          <button class="icon-btn" data-action="refresh" id="queueRefresh" title="Refresh" aria-label="Refresh queue"><svg class="icon" aria-hidden="true"><use href="#icon-refresh-cw"/></svg></button>
        </div>
        <div class="queue-list" id="queueList" role="list"></div>
      </section>

      <section class="tab-panel" data-panel="more" id="panelMore" role="tabpanel" aria-labelledby="tabMore" aria-hidden="true">
        <div class="settings">
          <div class="settings-group" aria-labelledby="moreAutoplayHeading">
            <div class="settings-heading" id="moreAutoplayHeading" data-i18n="autoplay">Autoplay</div>
            <div class="row">
              <span class="label" id="streamingToggleLabel" data-i18n="streaming">Autoplay</span>
              <button class="toggle" data-action="set_streaming" id="streamingToggle" aria-labelledby="streamingToggleLabel streamingToggle" aria-pressed="false">Off</button>
            </div>
            <div class="row">
              <span class="label" data-i18n="mode">Mode</span>
              <div class="segmented" role="radiogroup" aria-label="Autoplay mode">
                <button class="mode" data-action="set_streaming_mode" data-value="focused" id="modeFocused" role="radio" aria-checked="false">Focused</button>
                <button class="mode" data-action="set_streaming_mode" data-value="balanced" id="modeBalanced" role="radio" aria-checked="true">Balanced</button>
                <button class="mode" data-action="set_streaming_mode" data-value="discovery" id="modeDiscovery" role="radio" aria-checked="false">Discovery</button>
              </div>
            </div>
            <div class="row">
              <span class="label" data-i18n="source">Source</span>
              <select id="streamingSource" data-action="set_streaming_source"></select>
            </div>
            <div class="row">
              <span class="label" id="aiEnabledLabel" data-i18n="djGem">DJ Gem</span>
              <button class="toggle" data-action="set_ai_enabled" id="aiEnabled" aria-labelledby="aiEnabledLabel aiEnabled" aria-pressed="true">On</button>
            </div>
            <div class="row">
              <span class="label" id="radioModeLabel"><span data-i18n="radioMode">Radio mode</span> <span class="sub-label" id="radioHint"></span></span>
              <button class="toggle" data-action="set_radio_mode" id="radioMode" aria-labelledby="radioModeLabel radioMode" aria-pressed="false">Off</button>
            </div>
          </div>

          <div class="settings-group" aria-labelledby="morePlaybackHeading">
            <div class="settings-heading" id="morePlaybackHeading" data-i18n="tune">Playback</div>
            <div class="row">
              <span class="label" data-i18n="speed">Speed</span>
              <div class="stepper">
                <button data-action="speed_delta" data-delta="-1" id="speedDown" aria-label="Decrease speed">-</button>
                <span class="value" id="speedLabel">1.0x</span>
                <button data-action="speed_delta" data-delta="1" id="speedUp" aria-label="Increase speed">+</button>
              </div>
            </div>
            <div class="row">
              <span class="label" data-i18n="seekStep">Seek step</span>
              <div class="stepper">
                <button data-action="seek_delta" data-delta="-1" id="seekDown" aria-label="Decrease seek step">-</button>
                <span class="value" id="seekLabel">10s</span>
                <button data-action="seek_delta" data-delta="1" id="seekUp" aria-label="Increase seek step">+</button>
              </div>
            </div>
            <div class="row">
              <span class="label" id="normalizeLabel" data-i18n="normalize">Normalize</span>
              <button class="toggle" data-action="set_normalize" id="normalize" aria-labelledby="normalizeLabel normalize" aria-pressed="false">Off</button>
            </div>
            <div class="row">
              <span class="label" id="gaplessLabel" data-i18n="gapless">Gapless</span>
              <button class="toggle" data-action="set_gapless" id="gapless" aria-labelledby="gaplessLabel gapless" aria-pressed="true">On</button>
            </div>
            <div class="row">
              <span class="label" data-i18n="theme">Theme</span>
              <div class="segmented theme-pick" role="radiogroup" aria-label="Player skin">
                <button class="theme-opt" data-action="set_theme" data-value="default" role="radio">Cushion</button>
                <button class="theme-opt" data-action="set_theme" data-value="minimal" role="radio">Mini</button>
                <button class="theme-opt" data-action="set_theme" data-value="tamagotchi" role="radio">Tama</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="alert" id="error" role="alert" aria-live="assertive" hidden></div>

    <div class="dock">
      <button data-action="start_daemon" id="startDaemon">Start</button>
      <button data-action="resume_daemon" id="resumeDaemon">Resume</button>
      <button data-action="stop_daemon" id="stopDaemon">Stop</button>
      <button data-action="open_tui" id="openTui">Open TUI</button>
    </div>
  </div>
