name: ci-pr

# Daily PR / main merge gate on the debian-ts self-hosted runner.
# Full multi-OS release builds stay in build.yml (v* tags + workflow_dispatch).
# Optional Windows/macOS light jobs run only with label ci:windows / ci:macos
# or workflow_dispatch inputs — never required, so offline PCs cannot block merge.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_windows:
        description: Run optional Windows light job on self-hosted Windows runner
        type: boolean
        default: false
      run_macos:
        description: Run optional macOS light job on self-hosted Mac runner
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    # Repo-scoped self-hosted only; never schedule on fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Match debian-ts custom labels; OS/arch come from the runner automatically.
    runs-on: [self-hosted, debian, yututui]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Persist cargo target dir
        run: |
          mkdir -p "$HOME/.cache/yututui-ci/target"
          echo "CARGO_TARGET_DIR=$HOME/.cache/yututui-ci/target" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$HOME/.cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Vendored crossterm format
        run: cargo fmt --manifest-path crates/crossterm/Cargo.toml --all --check

      - name: Architecture invariants
        run: scripts/check-architecture.sh

      - name: File-size ratchet
        run: scripts/check-file-size.sh

      - name: Public docs honesty
        run: scripts/check-doc-honesty.sh

      - name: Vendored ratatui-image patch invariants
        run: scripts/check-ratatui-image-patch.sh

      - name: Vendored crossterm patch invariants
        run: scripts/check-crossterm-patch.sh

      - name: Ensure supply-chain tools
        run: |
          # Pinned so a runner-cached older/newer binary can't change what the gate means.
          want="0.19.6"
          have="$(cargo deny --version 2>/dev/null | awk '{print $2}')" || have=""
          [ "$have" = "$want" ] || cargo install --locked cargo-deny --version "$want"

      # RUSTSEC exceptions live in deny.toml [advisories].ignore — the single source
      # of truth (the old cargo-audit step duplicated them as --ignore flags).
      # --all-features widens ONLY this advisory scan to optional-feature deps
      # (desktop tray stack); bans/licenses/sources keep the default graph.
      - name: RustSec advisories (full feature graph)
        run: cargo deny --all-features check advisories

      - name: Dependency policy
        run: cargo deny check bans licenses sources

      - name: GUI frontend (typecheck, test, build)
        run: |
          cd gui
          npm ci
          npm run check
          npm run test
          npm run build

      - name: GUI protocol type drift
        run: scripts/check-gui-types.sh

      - name: Feature graph invariants
        run: |
          grep -qE '^default = \[\]' Cargo.toml
          if grep -E '^desktop = \[' Cargo.toml | grep -q 'ts-export'; then
            echo "error: the desktop feature must not enable ts-export" >&2
            exit 1
          fi

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high

  linux:
    name: Linux (x64)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Match debian-ts custom labels; OS/arch come from the runner automatically.
    runs-on: [self-hosted, debian, yututui]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Persist cargo target dir
        run: |
          mkdir -p "$HOME/.cache/yututui-ci/target"
          echo "CARGO_TARGET_DIR=$HOME/.cache/yututui-ci/target" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$HOME/.cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: clippy, llvm-tools-preview

      - name: Install Linux system dependencies
        run: |
          # Prefer already-installed packages; apt only if missing (may need passwordless sudo).
          if ! pkg-config --exists openssl 2>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y libssl-dev pkg-config
          fi

      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Vendored crossterm clippy (warnings = errors)
        run: >-
          cargo clippy --manifest-path crates/crossterm/Cargo.toml
          --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Vendored crossterm test
        run: cargo test --manifest-path crates/crossterm/Cargo.toml --all-features

      # Advisory while the number proves stable (81.99% on 2026-07-16, threshold 80);
      # flip to enforcing by dropping continue-on-error after a release cycle.
      - name: Core coverage (advisory)
        continue-on-error: true
        run: |
          want="0.8.5"
          have="$(cargo llvm-cov --version 2>/dev/null | awk '{print $2}')" || have=""
          [ "$have" = "$want" ] || cargo install --locked cargo-llvm-cov --version "$want"
          bash scripts/coverage-core.sh

  windows-optional:
    name: Windows (optional light)
    # Label/dispatch gated so offline Windows PCs never block merge. Keep expressions
    # event-safe: do not touch pull_request.* except inside a pull_request event_name check.
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_windows) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.pull_request.labels.*.name, 'ci:windows'))
    runs-on: [self-hosted, windows, x64, yututui]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: clippy

      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test tray helper
        run: "cargo test --features desktop -- desktop::"

  macos-optional:
    name: macOS (optional light)
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_macos) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.pull_request.labels.*.name, 'ci:macos'))
    runs-on: [self-hosted, macOS, ARM64, yututui]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Persist cargo target dir
        run: |
          mkdir -p "$HOME/.cache/yututui-ci/target"
          echo "CARGO_TARGET_DIR=$HOME/.cache/yututui-ci/target" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$HOME/.cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: clippy

      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test tray helper
        run: "cargo test --features desktop -- desktop::"
