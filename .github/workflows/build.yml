name: build

# Builds, lints, tests, and packages ytm-tui release binaries for macOS and Windows
# on native runners. Windows builds "just work" here (MSVC + SChannel via native-tls,
# no NASM/C-crypto toolchain needed) — which is why the actual .exe is produced in CI
# rather than cross-compiled from a Mac. Artifacts are uploaded for each OS.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (arm64)
            target: aarch64-apple-darwin
            bin: ytt
            archive: ytm-tui-macos-arm64.tar.gz
          - os: windows-latest
            name: Windows (x64)
            target: x86_64-pc-windows-msvc
            bin: ytt.exe
            archive: ytm-tui-windows-x64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # The project's quality gate is clippy with warnings-as-errors (the codebase uses
      # a deliberate compact style, not rustfmt's default), matching local development.
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Test
        run: cargo test --target ${{ matrix.target }}

      - name: Release build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          scripts/package-macos.sh "${{ matrix.target }}" "${{ matrix.archive }}" "${{ matrix.bin }}" "$GITHUB_WORKSPACE"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # Attach the per-OS archives to a GitHub Release when a v* tag is pushed.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ytm-tui-macos-arm64.tar.gz
            ytm-tui-windows-x64.zip
