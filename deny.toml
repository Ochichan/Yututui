[graph]
all-features = false
no-default-features = false

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Transitive via lofty 0.24.0. RUSTSEC marks paste unmaintained but lists no safe upgrade.
    "RUSTSEC-2024-0436",
]
yanked = "warn"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip = [
    { crate = "block-buffer@0.12.1", reason = "Transitive upstream graph convergence for 1.6.24; new duplicate crates must fail." },
    { crate = "cpufeatures@0.3.0", reason = "Transitive upstream graph convergence for 1.6.24; new duplicate crates must fail." },
