    { crate = "sha2@0.11.0", reason = "age 0.12's rust-embed i18n helper uses sha2 0.11 while age crypto and the application use 0.10. Review 2026-10." },
    { crate = "thiserror@1.0.69", reason = "Transitive upstream graph convergence for 1.6.24; new duplicate crates must fail." },
